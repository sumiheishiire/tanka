<!DOCTYPE html>
<!-- Generated by Claude | 2026-06-01 | redirect.html -->
<meta name="generator" content="Claude">
<html><head><meta charset="utf-8"><title>認証中...</title>
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f0f9ff;color:#1e3a5f}</style>
</head><body>
<p>🔑 認証処理中... このウィンドウは自動で閉じます</p>
<script>
(function(){
  var hash=window.location.hash.substring(1);
  var query=window.location.search.substring(1);
  var params={};
  [hash,query].forEach(function(str){
    str.split('&').forEach(function(pair){
      var kv=pair.split('=');
      if(kv[0])params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');
    });
  });
  var msg={type:'sp_auth_code',code:params['code']||null,state:params['state']||null,error:params['error']||null};

  // localStorageに保存（window.openerがnullの場合のフォールバック）
  try { localStorage.setItem('sp_auth_pending', JSON.stringify(msg)); } catch(e){}

  // window.openerが有効な場合はpostMessageも試みる
  if(window.opener){
    try { window.opener.postMessage(msg, window.opener.location.origin); } catch(e){}
  }

  document.querySelector('p').textContent = '✅ 認証完了。このウィンドウを閉じてください。';
  setTimeout(function(){window.close();}, 800);
})();
</script>
</body></html>
